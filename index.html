<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
<title>Unity WebGL Player | 000_13</title>
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #000;

    overflow-x: hidden;
    overflow-y: auto;

    -webkit-overflow-scrolling: touch;
  }

  #stage {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: #000;

    overflow: visible;

    padding-top: 20px;
    padding-bottom: 20px;
  }

  #unity-container {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));

    margin: 0 auto;

    background: #000;
    overflow: hidden;
  }

  #unity-canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    background: #000;
  }

  #unity-loading-bar {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
  }

  #unity-warning {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    z-index: 30;
  }

  #unity-footer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 25;
  }

  #ending-video-overlay {
    position: absolute;
    left: 6%;
    top: 23%;
    width: 28%;
    height: 30%;
    z-index: 999999;
    display: none;
    opacity: 0;
    visibility: hidden;
    overflow: hidden;
    pointer-events: auto;
    transition: opacity 0.35s ease;
    background: transparent;
    border: 0;
    box-sizing: border-box;
  }

  #ending-video-overlay.visible {
    display: block !important;
    opacity: 1 !important;
    visibility: visible !important;
  }

  #ending-video-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
  }

  @media (max-width: 768px) {
    #ending-video-overlay {
      left: 6%;
      top: 24%;
      width: 30%;
      height: 16%;
    }
  }

  /* 全螢幕仍維持置中 */
  #stage:fullscreen,
  #stage:-webkit-full-screen {
    width: 100vw;
    height: 100vh;
    background: #000;
  }

  #stage:fullscreen #unity-container,
  #stage:-webkit-full-screen #unity-container {
    position: absolute;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    margin: 0;
  }
</style>
</head>

<body>
<div id="stage">
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

    <div id="ending-video-overlay">
      <iframe
        id="ending-video-frame"
        src=""
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">000_13</div>
    </div>
  </div>
</div>

<script>
  const stage = document.querySelector("#stage");
  const container = document.querySelector("#unity-container");
  const canvas = document.querySelector("#unity-canvas");
  const loadingBar = document.querySelector("#unity-loading-bar");
  const progressBarFull = document.querySelector("#unity-progress-bar-full");
  const fullscreenButton = document.querySelector("#unity-fullscreen-button");
  const warningBanner = document.querySelector("#unity-warning");

  function unityShowBanner(msg, type) {
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? "block" : "none";
    }

    const div = document.createElement("div");
    div.innerHTML = msg;
    warningBanner.appendChild(div);

    if (type === "error") {
      div.style = "background:red; padding:10px;";
    } else {
      if (type === "warning") {
        div.style = "background:yellow; padding:10px;";
      }
      setTimeout(() => {
        if (div.parentNode) {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }
      }, 5000);
    }

    updateBannerVisibility();
  }

  const buildUrl = "Build";
  const loaderUrl = buildUrl + "/000_no13_build.loader.js";

  const config = {
    dataUrl: buildUrl + "/000_no13_build.data.unityweb",
    frameworkUrl: buildUrl + "/000_no13_build.framework.js.unityweb",
    codeUrl: buildUrl + "/000_no13_build.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "000_13",
    productVersion: "0.1.0",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    container.className = "unity-mobile";
    canvas.className = "unity-mobile";
  }

  loadingBar.style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (100 * progress) + "%";
    }).then((unityInstance) => {
      loadingBar.style.display = "none";

      fullscreenButton.onclick = () => {
        if (stage.requestFullscreen) {
          stage.requestFullscreen();
        } else if (stage.webkitRequestFullscreen) {
          stage.webkitRequestFullscreen();
        }
      };
    }).catch((message) => {
      alert(message);
    });
  };

  script.onerror = () => {
    alert("loader 載入失敗，請確認 Build 檔名完全一致");
  };

  document.body.appendChild(script);

  window.ShowYoutubeVideo = function (videoId) {
    const overlay = document.getElementById("ending-video-overlay");
    const iframe = document.getElementById("ending-video-frame");

    if (!overlay || !iframe) return;

    iframe.src = "";
    setTimeout(() => {
      iframe.src =
        "https://www.youtube.com/embed/" +
        videoId +
        "?autoplay=1&mute=1&playsinline=1&rel=0&controls=1&modestbranding=1";

      overlay.classList.add("visible");
      overlay.style.display = "block";
    }, 80);
  };

  window.HideYoutubeVideo = function () {
    const overlay = document.getElementById("ending-video-overlay");
    const iframe = document.getElementById("ending-video-frame");

    if (iframe) iframe.src = "";
    if (overlay) {
      overlay.classList.remove("visible");
      overlay.style.display = "none";
    }
  };
</script>
</body>
</html>
